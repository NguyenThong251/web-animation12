name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  BASE: /web-animation12

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # This is a static MIRROR of a Next.js App Router (RSC) site captured from
      # metamask.io. Every same-origin asset is referenced with a ROOT-ABSOLUTE
      # path (/_next/…, /assets/…, /favicons/…, /glb/…, /masks/…, /videos/…), and
      # the webpack runtime hard-codes its publicPath as .p="/_next/". GitHub Pages
      # serves this project at the /web-animation12 subpath, so every one of those
      # root-absolute prefixes must be rewritten to /web-animation12/…  (CDN images
      # on //images.ctfassets.net stay as-is — they're absolute and load from CDN).
      - name: Build site (rewrite root-absolute paths for the subpath)
        run: |
          set -euo pipefail
          rm -rf _site && mkdir -p _site
          # GitHub Pages already serves the ARTIFACT ROOT at the /web-animation12
          # subpath, so the files live at _site/ (root) while their internal
          # references are rewritten to /web-animation12/… — a request for
          # /web-animation12/_next/x then maps to artifact _next/x.
          cp -r public/. _site/
          touch _site/.nojekyll

          esc() { printf '%s' "$1" | sed 's/[\/&]/\\&/g'; }
          B="$(esc "$BASE")"

          # Rewrite HTML, CSS and JS. The six prefixes below are unique tokens that
          # never occur as a substring of the CDN host, so a literal prefix is safe.
          find _site -type f \( -name '*.html' -o -name '*.css' -o -name '*.js' -o -name '*.json' \) -print0 \
            | xargs -0 sed -i \
                -e "s/\/_next\//${B}\/_next\//g" \
                -e "s/\/assets\//${B}\/assets\//g" \
                -e "s/\/favicons\//${B}\/favicons\//g" \
                -e "s/\/glb\//${B}\/glb\//g" \
                -e "s/\/masks\//${B}\/masks\//g" \
                -e "s/\/videos\//${B}\/videos\//g"

          # Vercel Web-Analytics / Speed-Insights inject a <script> whose src is
          # built as `"/" + scriptSrc` from a hashed proxy path in the bundle
          # (e.g. "scriptSrc":"b01874da77d8b383/script.js"). That telemetry is
          # Vercel-edge-only and can't run on static hosting, but the root-absolute
          # <script> 404s and logs a console error. Prefix the hashed paths with the
          # base (no leading slash — the SDK adds it) so the captured script loads
          # 200; the vitals/view/event beacons then POST via sendBeacon and fail
          # silently. Any 8–32-char hex proxy dir followed by a known suffix.
          BNS="${BASE#/}"
          find _site -type f -name '*.js' -print0 \
            | xargs -0 sed -i -E \
                "s#(\"(scriptSrc|endpoint|viewEndpoint|eventEndpoint|sessionEndpoint)\":\")([0-9a-f]{8,32}/)#\1${BNS}/\3#g"

          # Guard against accidental double-prefixing if the workflow is re-run on a
          # tree that was already rewritten.
          find _site -type f \( -name '*.html' -o -name '*.css' -o -name '*.js' -o -name '*.json' \) -print0 \
            | xargs -0 sed -i -e "s#${B}${B}/#${B}/#g" -e "s#${BNS}/${BNS}/#${BNS}/#g"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
